<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Ayurvedic Diet Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2300695c'/><text x='50' y='72' font-size='62' text-anchor='middle' fill='white' font-family='sans-serif'>आ</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="/" class="auth-brand">
      <div class="logo">आ</div>
      <strong>Ayurvedic Diet Planner</strong>
    </a>
    <p class="tag">पथ्य · अपथ्य · अल्प-मात्रा</p>

    <h1>Sign in to continue</h1>
    <p class="auth-sub">Use your Google account. New here? Signing in creates your account automatically.</p>

    <div id="googleBtn" class="gbtn-wrap"></div>

    <p id="authMsg" class="auth-msg" hidden></p>
    <p class="auth-fine">By continuing you agree to keep patient data handled responsibly.</p>
  </div>

  <script src="auth.js"></script>
  <script>
    // Already signed in? Go straight to the app.
    if (Auth.token()) location.href = "/app";

    const msg = (t, err) => {
      const el = document.getElementById("authMsg");
      el.textContent = t; el.hidden = false; el.classList.toggle("err", !!err);
    };

    async function onCredential(response) {
      try {
        const res = await fetch("/api/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Sign-in failed");
        Auth.setSession(data.token, data.doctor);
        location.href = "/app";
      } catch (e) {
        msg(e.message, true);
      }
    }

    // Wait for the GIS library, fetch our client id, render the button.
    (async function init() {
      let cfg;
      try {
        cfg = await fetch("/api/auth/config").then((r) => r.json());
      } catch {
        return msg("Cannot reach the server.", true);
      }
      if (!cfg.configured || !cfg.googleClientId) {
        return msg("Google sign-in isn't configured yet. Add GOOGLE_CLIENT_ID to the server .env (see README).", true);
      }

      // Poll until the Google script is ready.
      const ready = () => window.google && google.accounts && google.accounts.id;
      let tries = 0;
      while (!ready() && tries++ < 60) await new Promise((r) => setTimeout(r, 100));
      if (!ready()) return msg("Could not load Google sign-in. Check your connection.", true);

      google.accounts.id.initialize({ client_id: cfg.googleClientId, callback: onCredential });
      google.accounts.id.renderButton(document.getElementById("googleBtn"), {
        theme: "outline", size: "large", shape: "pill", width: 280, text: "continue_with",
      });
    })();
  </script>
</body>
</html>
